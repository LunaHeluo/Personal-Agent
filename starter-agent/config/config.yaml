app:
  name: Starter Agent
  environment: development
  database_url: sqlite:///data/agent.db
  log_path: logs/agent.jsonl
  identity_path: docs/agent.md

model:
  default_provider: zhipu
  default_model: glm-4.7
  temperature: 0.2
  timeout_seconds: 60
  max_retries: 2

providers:
  mock:
    type: mock
    models:
      - starter-mock
  tokenrouter:
    type: openai_compatible
    models:
      - openai/gpt-5.5
      - openai/gpt-5.6-terra
    base_url: https://api.tokenrouter.com/v1
    api_key_env: TOKENROUTER_API_KEY
    stream: true
  zhipu:
    type: openai_compatible
    models:
      - glm-4.7
      - glm-5.1
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key_env: ZHIPU_API_KEY
    stream: true
    thinking: disabled
  openai:
    type: openai_compatible
    models:
      - gpt-5.5
      - gpt-5.6-terra
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
  deepseek:
    type: openai_compatible
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
  qwen:
    type: openai_compatible
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY

runtime:
  max_model_calls: 4
  max_tool_calls: 4
  max_seconds: 90
  tool_timeout_seconds: 35
  max_tool_result_chars: 8000

mcp:
  config_path: config/mcp.json

context:
  max_total_tokens: 128000
  warning_ratio: 0.8
  compact_trigger_ratio: 0.75
  hard_prompt_ratio: 0.85
  history_budget_tokens: 6000
  keep_recent_turns: 6
  per_tool_result_tokens: 4000
  all_tool_results_tokens: 16000
  estimator_safety_ratio: 1.15

memory:
  auto_write_enabled: true
  min_confidence: 0.85
  max_candidates_per_turn: 5
  source_max_chars: 20000
  timeout_seconds: 30

tools:
  enabled:
    - get_current_time
    - search_jobs_serpapi
    - search_job_description
    - read_resume
    - list_resume_versions
    - save_resume
    - compare_resume
    - compare_resume_to_jd
    - draft_resume_patch
    - save_resume_version
    - email_search
    - email_read
    - email_create_draft
    - email_send
  allow_risk_levels:
    - read
    - write
    - external
  email:
    active_profile: qq
    result_max_items: 20
    body_max_chars: 12000
    attachment_root: tests/fixtures/email/attachments
    profiles:
      mock:
        adapter: mock_fixture
        fixture_root: tests/fixtures/email
        real_send_enabled: false
      qq:
        adapter: imap_smtp
        mailbox_type: qq
        account_env: EMAIL_ACCOUNT
        auth:
          type: qq_auth_code
          credential_env: EMAIL_CREDENTIAL
        imap:
          host: imap.qq.com
          port: 993
          transport: ssl_tls
        smtp:
          host: smtp.qq.com
          port: 465
          transport: ssl_tls
        real_send_enabled: true
  serpapi:
    active_key: primary
    active_key_env: SERPAPI_ACTIVE_KEY
    timeout_seconds: 15
    max_retries: 1
    retry_backoff_seconds: 0.5
    keys:
      primary:
        api_key_env: SERPAPI_API_KEY
      backup:
        api_key_env: SERPAPI_API_KEY_BACKUP
  job_description:
    fetch_timeout_seconds: 10
    max_response_bytes: 1000000
    max_redirects: 3
    user_agent: StarterAgentJobDescription/0.1
    respect_robots: true
  resume:
    root: examples/job-hunt-agent/job-hunt-agent/data

