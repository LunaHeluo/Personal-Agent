app:
  name: Starter Agent
  environment: development
  database_url: sqlite:///data/agent.db
  log_path: logs/agent.jsonl
  identity_path: docs/agent.md

model:
  default_provider: mock
  default_model: starter-mock
  temperature: 0.2
  timeout_seconds: 60
  max_retries: 2

providers:
  mock:
    type: mock
  tokenrouter:
    type: openai_compatible
    base_url: https://api.tokenrouter.com/v1
    api_key_env: TOKENROUTER_API_KEY
    stream: true
  zhipu:
    type: openai_compatible
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key_env: ZHIPU_API_KEY
    stream: true
    thinking: disabled
  openai:
    type: openai_compatible
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
  deepseek:
    type: openai_compatible
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
  qwen:
    type: openai_compatible
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY
  local:
    type: openai_compatible
    base_url: http://localhost:11434/v1
    api_key_env: OLLAMA_API_KEY

runtime:
  max_model_calls: 4
  max_tool_calls: 4
  max_seconds: 90
  tool_timeout_seconds: 35
  max_tool_result_chars: 8000

mcp:
  config_path: config/mcp.json

knowledge:
  # 仅配置容量和行为参数；不要在 YAML 中放入秘密或私人文档正文。
  enabled: true
  default_user_id: local-user
  default_project_id: default-project
  max_upload_bytes: 2097152
  max_documents: 100
  max_chunks: 5000
  allowed_extensions:
    - .md
    - .markdown
  chunk_target_chars: 1200
  chunk_overlap_chars: 150
  retrieval_top_k: 6
  # 可选：覆盖或追加公共领域映射词；不要放入私人正文或凭据。
  # query_mappings:
  #   version: local-v1
  #   groups:
  #     rag: [RAG, 检索增强, 知识库]
  #   disabled_groups: []

tools:
  enabled:
    - get_current_time
  allow_risk_levels:
    - read
  job_description:
    fetch_timeout_seconds: 10
    max_response_bytes: 1000000
    max_redirects: 3
    user_agent: StarterAgentJobDescription/0.1
    respect_robots: true
  email:
    active_profile: mock
    result_max_items: 20
    body_max_chars: 12000
    attachment_root: tests/fixtures/email/attachments
    profiles:
      mock:
        adapter: mock_fixture
        fixture_root: tests/fixtures/email
        real_send_enabled: false
      # Add a real profile only after the mailbox type, endpoints, transport,
      # authentication method, and test recipient are confirmed. Keep secrets
      # in .env; YAML stores environment variable names only.
      # personal:
      #   adapter: imap_smtp
      #   mailbox_type: custom
      #   account_env: EMAIL_ACCOUNT
      #   auth:
      #     type: app_password
      #     credential_env: EMAIL_CREDENTIAL
      #   imap:
      #     host: null
      #     port: null
      #     transport: null
      #   smtp:
      #     host: null
      #     port: null
      #     transport: null
      #   drafts_mailbox: null
      #   real_send_enabled: false
